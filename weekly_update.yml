# .github/workflows/weekly_update.yml
# Runs Monday at 12pm and Tuesday at 7am UK time to catch late scorecard uploads.
# Fetches latest weekend results, calculates POTM, and commits updated dashboard data.

name: Weekly Dashboard Update

on:
  schedule:
    # Monday 12:00 PM BST (11:00 AM UTC) — primary run
    - cron: '0 11 * * 1'
    # Tuesday 7:00 AM BST (6:00 AM UTC) — catch late Sunday uploads
    - cron: '0 6 * * 2'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dateutil

      - name: Run weekly scraper
        env:
          PLAYCRICKET_API_KEY: ${{ secrets.PLAYCRICKET_API_KEY }}
          PLAYCRICKET_SITE_ID: ${{ secrets.PLAYCRICKET_SITE_ID }}
        run: |
          python scraper.py

      - name: Commit and push updated data
        run: |
          git config user.name "HTCC Dashboard Bot"
          git config user.email "dashboard@harrowtowncc.co.uk"
          git add data/
          git diff --staged --quiet || git commit -m "Weekly dashboard update - $(date +%Y-%m-%d)"
          git push

# .github/workflows/weekly_update.yml
# Runs every Monday at 7:00 AM UK time, fetches latest results,
# calculates POTM, and commits updated dashboard data.

name: Weekly Dashboard Update

on:
  schedule:
    # 7:00 AM BST (6:00 AM UTC during British Summer Time)
    # Adjust to 07:00 UTC during GMT months
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dateutil

      - name: Run weekly scraper
        env:
          PLAYCRICKET_API_KEY: ${{ secrets.PLAYCRICKET_API_KEY }}
          PLAYCRICKET_SITE_ID: ${{ secrets.PLAYCRICKET_SITE_ID }}
        run: |
          python scraper.py

      - name: Commit and push updated data
        run: |
          git config user.name "HTCC Dashboard Bot"
          git config user.email "dashboard@harrowtowncc.co.uk"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Week $(date +%V) dashboard update - $(date +%Y-%m-%d)"
          git push

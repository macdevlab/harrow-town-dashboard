<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harrow Town CC — Season Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700;1,900&family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c1220;
  --bg-card: #111a2b;
  --bg-card-hover: #152036;
  --gold: #c8a84e;
  --gold-dim: #8a7435;
  --gold-bright: #e8cc6a;
  --cream: #f0e8d0;
  --cream-dim: #b0a888;
  --green: #4cba6a;
  --green-bg: rgba(76,186,106,0.12);
  --red: #d45050;
  --red-bg: rgba(212,80,80,0.12);
  --blue: #5a9fd4;
  --text: #d8d0bc;
  --text-dim: #7a7468;
  --text-muted: #4a4640;
  --border: rgba(200,168,78,0.12);
  --border-strong: rgba(200,168,78,0.25);
  --accent-bar-won: var(--green);
  --accent-bar-lost: var(--red);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ═══ HEADER BAR ═══ */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;border-bottom:1px solid var(--border)}
.top-bar-left{display:flex;align-items:center;gap:0.8rem}
.top-bar-logo{width:40px;height:40px}
.top-bar-logo img{width:100%;height:100%;object-fit:contain}
.top-bar-name{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--cream-dim)}
.top-bar-right{display:flex;align-items:center;gap:1.5rem}
.nav-pill{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;padding:0.4rem 0;border:none;background:none;transition:color 0.2s}
.nav-pill:hover{color:var(--text-dim)}
.nav-pill.active{color:var(--gold)}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:0.4rem}
.status-dot.live{background:var(--green)}.status-dot.demo{background:var(--gold)}

/* ═══ PANELS ═══ */
.panel{display:none}.panel.active{display:block}

/* ═══ POTW HERO SECTION ═══ */
.potw-hero{padding:2.5rem 2.5rem 0}
.potw-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.4rem}
.potw-label{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim)}
.potw-label::before{content:'●';margin-right:0.5rem;color:var(--gold)}
.potw-week-info{text-align:right}
.potw-week-num{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}
.potw-week-date{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream-dim)}
.potw-headline{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;color:var(--cream);line-height:1.05;margin-bottom:2rem}
.potw-headline em{color:var(--gold);font-style:italic}

/* ═══ TEAM GRID ═══ */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;padding:0 2.5rem 2.5rem}
.t-card{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;overflow:hidden;position:relative;transition:border-color 0.2s}
.t-card:hover{border-color:var(--border-strong)}

/* Accent bar top */
.t-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.t-card.won::before{background:var(--green)}
.t-card.lost::before{background:var(--red)}
.t-card.draw::before{background:var(--gold)}

/* Card header */
.t-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem 0.4rem}
.t-team-label{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.t-opponent{font-family:'Playfair Display',serif;font-size:0.78rem;color:var(--text-dim);font-style:italic}
.t-result-badge{font-family:'IBM Plex Mono',monospace;font-size:0.55rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:0.2rem 0.55rem;border:1px solid;border-radius:3px}
.t-result-badge.won{color:var(--green);border-color:var(--green)}
.t-result-badge.lost{color:var(--red);border-color:var(--red)}
.t-result-badge.draw{color:var(--gold);border-color:var(--gold)}

/* Score line */
.t-score{padding:0.25rem 1.25rem 0.75rem;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--text-dim);border-bottom:1px solid var(--border)}

/* POTM hero */
.t-potm{display:flex;justify-content:space-between;align-items:center;padding:0.9rem 1.25rem}
.t-potm-name{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:var(--cream);line-height:1.05}
.t-potm-pts{text-align:right}
.t-potm-pts .pts-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:var(--gold);line-height:1;font-style:italic}
.t-potm-pts .pts-label{font-family:'IBM Plex Mono',monospace;font-size:0.5rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dim)}

/* Stat detail lines */
.t-stats{padding:0 1.25rem 1rem;display:flex;flex-direction:column;gap:0.3rem}
.t-stat-line{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;display:flex;align-items:center;gap:0.5rem}
.t-stat-cat{font-weight:600;letter-spacing:1px;text-transform:uppercase;width:40px;flex-shrink:0}
.t-stat-cat.bat{color:var(--blue)}
.t-stat-cat.bowl{color:var(--green)}
.t-stat-cat.field{color:var(--gold)}
.t-stat-detail{color:var(--cream-dim)}
.t-stat-detail span{margin:0 0.15rem;color:var(--text-muted)}

/* ═══ LEADERBOARD ═══ */
.lb-section{padding:2rem 2.5rem}
.lb-section .sec-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:var(--cream);margin-bottom:1.5rem}
.lb-tabs{display:flex;gap:0.4rem;margin-bottom:1.25rem}
.lb-btn{padding:0.5rem 1.2rem;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;background:var(--bg-card);color:var(--text-muted);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all 0.2s}
.lb-btn:hover{color:var(--text-dim);border-color:var(--border-strong)}
.lb-btn.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.lb-panel{display:none}.lb-panel.active{display:block}
.lb-table{width:100%;border-collapse:collapse;background:var(--bg-card);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.lb-table thead th{padding:0.7rem 0.8rem;font-family:'IBM Plex Mono',monospace;font-size:0.6rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-dim);background:rgba(0,0,0,0.3);text-align:left;border-bottom:1px solid var(--border)}
.lb-table thead th.r{text-align:right}
.lb-table tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s}
.lb-table tbody tr:last-child{border-bottom:none}
.lb-table tbody tr:hover{background:rgba(200,168,78,0.05)}
.lb-table tbody td{padding:0.6rem 0.8rem;font-size:0.82rem;vertical-align:middle}
.lb-table tbody td.r{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--cream-dim)}
.lb-table tbody td.pts-col{text-align:right;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--gold)}
.rank{font-family:'Playfair Display',serif;font-weight:900;font-size:1rem;color:var(--text-muted);width:32px}
.rank.g1{color:var(--gold-bright)}.rank.g2{color:#c0c0c0}.rank.g3{color:#cd7f32}
.p-name{font-weight:600;font-family:'DM Sans',sans-serif}
.p-team{font-family:'IBM Plex Mono',monospace;font-size:0.55rem;color:var(--text-muted);margin-left:0.35rem;letter-spacing:0.5px}

/* ═══ AUTO-CYCLE PROGRESS ═══ */
.cycle-bar{position:fixed;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,0.3);z-index:100}
.cycle-fill{height:100%;background:var(--gold);width:0%;transition:width 0.1s linear}

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){
  .team-grid{grid-template-columns:1fr}
  .potw-hero{padding:1.5rem 1.25rem 0}
  .team-grid{padding:0 1.25rem 1.5rem}
  .top-bar{padding:0.75rem 1.25rem}
  .lb-section{padding:1.5rem 1.25rem}
  .t-potm-name{font-size:1.4rem}
  .t-potm-pts .pts-num{font-size:1.6rem}
}
@media(max-width:480px){
  .potw-headline{font-size:1.8rem}
  .top-bar-name{display:none}
}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.t-card{animation:fadeUp 0.5s ease both}
.t-card:nth-child(2){animation-delay:0.08s}
.t-card:nth-child(3){animation-delay:0.16s}
.t-card:nth-child(4){animation-delay:0.24s}
.potw-headline{animation:fadeUp 0.6s ease both}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-left">
    <div class="top-bar-logo"><img src="club-crest.png" alt="HTCC"></div>
    <div class="top-bar-name">Harrow Town Cricket Club</div>
  </div>
  <div class="top-bar-right">
    <button class="nav-pill active" data-panel="potw">Performances</button>
    <button class="nav-pill" data-panel="leaderboard">Leaderboards</button>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--text-muted)"><span class="status-dot demo" id="data-dot"></span><span id="data-label">Demo</span></span>
  </div>
</div>

<!-- POTW PANEL -->
<div class="panel active" id="panel-potw">
  <div class="potw-hero">
    <div class="potw-top">
      <div class="potw-label">Performances of the Week</div>
      <div class="potw-week-info">
        <div class="potw-week-num" id="wk-num">Match-Week 01</div>
        <div class="potw-week-date" id="wk-date">Saturday, 9 May</div>
      </div>
    </div>
    <h1 class="potw-headline" id="headline">Four matches, <em>four standouts.</em></h1>
  </div>
  <div class="team-grid" id="team-grid"></div>
</div>

<!-- LEADERBOARD PANEL -->
<div class="panel" id="panel-leaderboard">
  <div class="lb-section">
    <div class="sec-title">Season Leaderboards</div>
    <div class="lb-tabs" id="lb-tabs"></div>
    <div id="lb-container"></div>
  </div>
</div>

<!-- CYCLE BAR -->
<div class="cycle-bar"><div class="cycle-fill" id="cycle-fill"></div></div>

<script>
const TEAM_ORDER=["1st XI","2nd XI","3rd XI","4th XI"];
const LB_CATS=[
  {id:'bat',label:'Batting',cols:[{k:'innings',l:'Inn',c:'r'},{k:'runs',l:'Runs',c:'r'},{k:'avg',l:'Avg',c:'r'},{k:'hs',l:'HS',c:'r'},{k:'fifties',l:'50s',c:'r'},{k:'hundreds',l:'100s',c:'r'}],pk:'pts'},
  {id:'bowl',label:'Bowling',cols:[{k:'overs',l:'Ov',c:'r'},{k:'wickets',l:'Wkts',c:'r'},{k:'avg',l:'Avg',c:'r'},{k:'economy',l:'Econ',c:'r'},{k:'best',l:'BF',c:'r'}],pk:'pts'},
  {id:'field',label:'Fielding',cols:[{k:'catches',l:'Ct',c:'r'},{k:'run_outs',l:'RO',c:'r'},{k:'stumpings',l:'St',c:'r'},{k:'total',l:'Total',c:'r'}],pk:'pts'},
  {id:'overall',label:'Overall',cols:[{k:'batting_pts',l:'Bat',c:'r'},{k:'bowling_pts',l:'Bowl',c:'r'},{k:'fielding_pts',l:'Field',c:'r'}],pk:'total_pts'},
];

const DEMO={updated:new Date().toISOString(),season:2026,matchweek:1,matchweek_date:"09/05/2026",
weekly_performances:[
{team:"1st XI",opponent:"Kay Plus CC",result:"Harrow Town CC - 1st XI - Won",won:true,date:"09/05/2026",our_score:"189/3",opp_score:"142",
players:{"Prayash Singh":{batting_pts:52,bowling_pts:75,fielding_pts:10,total_pts:137,batting:{runs:35,balls:30,fours:4,sixes:1,how_out:"ct"},bowling:{overs:"8.4",wickets:3,runs:40,maidens:0},fielding:{catches:1,run_outs:0,stumpings:0}}},
potm_winner:{name:"Prayash Singh",total_pts:137},best_batter:{name:"Prayash Singh",pts:52},best_bowler:{name:"Prayash Singh",pts:75},best_fielder:{name:"Prayash Singh",pts:10}},
{team:"2nd XI",opponent:"Stoke Newington CC",result:"Stoke Newington CC - Won",won:false,date:"09/05/2026",our_score:"148",opp_score:"196/4",
players:{"Mohsin Shafi":{batting_pts:22,bowling_pts:75,fielding_pts:10,total_pts:107,batting:{runs:18,balls:26,fours:2,sixes:0,how_out:"ct"},bowling:{overs:"9",wickets:3,runs:27,maidens:0},fielding:{catches:0,run_outs:0,stumpings:0}}},
potm_winner:{name:"Mohsin Shafi",total_pts:107},best_batter:{name:"Mohsin Shafi",pts:22},best_bowler:{name:"Mohsin Shafi",pts:75},best_fielder:{name:"Mohsin Shafi",pts:10}},
{team:"3rd XI",opponent:"Harrow CC 3rd XI",result:"Harrow CC - Won",won:false,date:"09/05/2026",our_score:"89",opp_score:"201/6",
players:{"Mayur Pawar":{batting_pts:0,bowling_pts:109,fielding_pts:10,total_pts:119,batting:{runs:0,balls:0,fours:0,sixes:0,how_out:""},bowling:{overs:"10.5",wickets:4,runs:40,maidens:1},fielding:{catches:1,run_outs:0,stumpings:0}}},
potm_winner:{name:"Mayur Pawar",total_pts:119},best_batter:{name:"Mayur Pawar",pts:0},best_bowler:{name:"Mayur Pawar",pts:109},best_fielder:{name:"Mayur Pawar",pts:10}},
{team:"4th XI",opponent:"Kay Plus CC 3rd XI",result:"Kay Plus CC - Won",won:false,date:"09/05/2026",our_score:"112",opp_score:"165/3",
players:{"Jebin Raja":{batting_pts:0,bowling_pts:75,fielding_pts:10,total_pts:85,batting:{runs:0,balls:0,fours:0,sixes:0,how_out:""},bowling:{overs:"5",wickets:3,runs:38,maidens:0},fielding:{catches:1,run_outs:0,stumpings:0}}},
potm_winner:{name:"Jebin Raja",total_pts:85},best_batter:{name:"Jebin Raja",pts:0},best_bowler:{name:"Jebin Raja",pts:75},best_fielder:{name:"Jebin Raja",pts:10}},
],
leaderboards:{batting:[],bowling:[],fielding:[],overall:[]}};

let dashData=null,isLive=false;

async function init(){
  try{const r=await fetch('data/dashboard.json');if(r.ok){dashData=await r.json();isLive=true}else throw 0}
  catch{dashData=DEMO;isLive=false}
  const dot=document.getElementById('data-dot');
  const lbl=document.getElementById('data-label');
  dot.className=`status-dot ${isLive?'live':'demo'}`;
  lbl.textContent=isLive?'Live':'Demo';
  renderPOTW();
  renderLeaderboards();
  startAutoCycle();
}

function renderPOTW(){
  const wk=dashData.matchweek||1;
  const dt=dashData.matchweek_date||'';
  document.getElementById('wk-num').textContent=`Match-Week ${String(wk).padStart(2,'0')}`;
  // Format date nicely
  if(dt){
    try{
      const parts=dt.split('/');
      const d=new Date(parts[2],parts[1]-1,parts[0]);
      const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('wk-date').textContent=`${days[d.getDay()]}, ${parseInt(parts[0])} ${months[d.getMonth()]}`;
    }catch(e){document.getElementById('wk-date').textContent=dt}
  }

  const ps=dashData.weekly_performances||[];
  const count=ps.length;
  const standouts=['zero','one standout','two standouts','three standouts','four standouts','five standouts'];
  const matches=['zero','One match','Two matches','Three matches','Four matches','Five matches'];
  document.getElementById('headline').innerHTML=`${matches[count]||count+' matches'}, <em>${standouts[count]||count+' standouts'}.</em>`;

  const sorted=[...ps].sort((a,b)=>{const ia=TEAM_ORDER.indexOf(a.team),ib=TEAM_ORDER.indexOf(b.team);return(ia<0?99:ia)-(ib<0?99:ib)});
  const grid=document.getElementById('team-grid');

  grid.innerHTML=sorted.map(m=>{
    const rc=m.won?'won':(m.result&&m.result.toLowerCase().includes('draw')?'draw':'lost');
    const pm=m.potm_winner||{};
    const pp=m.players?m.players[pm.name]:null;

    // Build stat lines
    let statLines='';
    if(pp){
      const b=pp.batting||{};
      const bw=pp.bowling||{};
      const f=pp.fielding||{};

      // Batting line
      if(b.runs!=null && (b.runs>0 || b.balls>0)){
        const no=String(b.how_out||'').toLowerCase().includes('not out')?'*':'';
        const sr=b.balls>0?((b.runs/b.balls)*100).toFixed(1):'0.0';
        let batParts=[`${b.runs}${no} (${b.balls||0})`];
        if(b.fours)batParts.push(`${b.fours}×4`);
        if(b.sixes)batParts.push(`${b.sixes}×6`);
        batParts.push(`SR ${sr}`);
        statLines+=`<div class="t-stat-line"><span class="t-stat-cat bat">Bat</span><span class="t-stat-detail">${batParts.join(' <span>·</span> ')}</span></div>`;
      }

      // Bowling line
      if(bw.wickets!=null && (bw.wickets>0 || bw.overs)){
        let bowlParts=[`${bw.overs||0} ov`];
        if(bw.maidens)bowlParts.push(`${bw.maidens} m`);
        bowlParts.push(`${bw.runs||0} r`);
        bowlParts.push(`${bw.wickets} wkts`);
        const oFloat=parseFloat(String(bw.overs||'0').replace(/\.(\d)$/,(m,b)=>'.'+String(parseInt(b)/6).slice(2)));
        const actualOvers=parseFloat(bw.overs)||0;
        const fullOv=Math.floor(actualOvers);
        const partBalls=Math.round((actualOvers-fullOv)*10);
        const totalBallsBowled=fullOv*6+partBalls;
        const econ=totalBallsBowled>0?((bw.runs||0)/(totalBallsBowled/6)).toFixed(2):'0.00';
        bowlParts.push(`econ ${econ}`);
        statLines+=`<div class="t-stat-line"><span class="t-stat-cat bowl">Bowl</span><span class="t-stat-detail">${bowlParts.join(' <span>·</span> ')}</span></div>`;
      }

      // Fielding line
      const fParts=[];
      if(f.catches)fParts.push(`${f.catches} catch${f.catches>1?'es':''}`);
      if(f.run_outs)fParts.push(`${f.run_outs} run out${f.run_outs>1?'s':''}`);
      if(f.stumpings)fParts.push(`${f.stumpings} stumping${f.stumpings>1?'s':''}`);
      if(fParts.length){
        statLines+=`<div class="t-stat-line"><span class="t-stat-cat field">Field</span><span class="t-stat-detail">${fParts.join(' <span>·</span> ')}</span></div>`;
      }
    }

    // Opponent short name
    const oppShort=m.opponent.replace(/\s*CC\s*/,'').replace(/\s*-\s*\d+\w+\s*XI/,'').trim();

    // Home/Away
    const homeAway=m.result&&m.result.toLowerCase().includes('harrow town')&&m.result.toLowerCase().indexOf('harrow town')<m.result.toLowerCase().indexOf('-')?'Home':'Away';

    // Score line
    let scoreLine='';
    if(m.our_score||m.opp_score){
      scoreLine=`HTCC ${m.our_score||'?'} — ${oppShort} ${m.opp_score||'?'}`;
    }

    // Split name for large display
    const nameParts=(pm.name||'N/A').split(' ');
    const firstName=nameParts.slice(0,-1).join(' ')||'';
    const lastName=nameParts[nameParts.length-1]||'';

    return `<div class="t-card ${rc}">
      <div class="t-header">
        <div><span class="t-team-label">${m.team}</span> <span class="t-opponent">vs ${m.opponent} · ${homeAway}</span></div>
        <span class="t-result-badge ${rc}">${rc==='won'?'Won':rc==='draw'?'Draw':'Lost'}</span>
      </div>
      ${scoreLine?`<div class="t-score">${scoreLine}</div>`:''}
      <div class="t-potm">
        <div class="t-potm-name">${firstName}<br>${lastName}</div>
        <div class="t-potm-pts"><div class="pts-num">${pm.total_pts||0}</div><div class="pts-label">Points</div></div>
      </div>
      <div class="t-stats">${statLines}</div>
    </div>`;
  }).join('');
}

function renderLeaderboards(){
  const lb=dashData.leaderboards||{};
  const dataMap={bat:lb.batting||[],bowl:lb.bowling||[],field:lb.fielding||[],overall:lb.overall||[]};
  const tabsEl=document.getElementById('lb-tabs');
  tabsEl.innerHTML=LB_CATS.map((c,i)=>`<button class="lb-btn${i===0?' active':''}" data-lb="${c.id}">${c.label}</button>`).join('');
  const container=document.getElementById('lb-container');
  container.innerHTML='';
  LB_CATS.forEach((cat,idx)=>{
    const data=[...(dataMap[cat.id]||[])].sort((a,b)=>(b[cat.pk]||0)-(a[cat.pk]||0));
    const panel=document.createElement('div');
    panel.className=`lb-panel${idx===0?' active':''}`;
    panel.id=`lb-${cat.id}`;
    if(!data.length){panel.innerHTML='<div style="padding:2rem;text-align:center;color:var(--text-muted)">No data yet this season</div>';container.appendChild(panel);return}
    const th=cat.cols.map(c=>`<th class="${c.c||''}">${c.l}</th>`).join('');
    const rows=data.slice(0,10).map((r,i)=>{
      const rc=i===0?'g1':i===1?'g2':i===2?'g3':'';
      const td=cat.cols.map(c=>`<td class="${c.c||''}">${r[c.k]??'—'}</td>`).join('');
      return `<tr><td class="rank ${rc}">${i+1}</td><td class="p-name">${r.name}<span class="p-team">${r.team}</span></td>${td}<td class="pts-col">${(r[cat.pk]||0).toLocaleString()}</td></tr>`;
    }).join('');
    panel.innerHTML=`<table class="lb-table"><thead><tr><th>#</th><th>Player</th>${th}<th class="r">Pts</th></tr></thead><tbody>${rows}</tbody></table>`;
    container.appendChild(panel);
  });
  tabsEl.querySelectorAll('.lb-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      tabsEl.querySelectorAll('.lb-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.lb-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      const p=document.getElementById(`lb-${btn.dataset.lb}`);if(p)p.classList.add('active');
    });
  });
}

// ═══ AUTO CYCLE ═══
const POTW_DURATION=12000;
const LB_DURATION=8000;
let cyclePhase='potw';
let cycleTimer=null;
let cycleElapsed=0;
let cyclePaused=false;
let lbIndex=0;

function switchPanel(id){
  document.querySelectorAll('.nav-pill').forEach(b=>b.classList.toggle('active',b.dataset.panel===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(`panel-${id}`).classList.add('active');
}

function startAutoCycle(){
  cyclePhase='potw';
  switchPanel('potw');
  cycleElapsed=0;
  lbIndex=0;
  clearInterval(cycleTimer);
  const fill=document.getElementById('cycle-fill');
  const tick=50;
  cycleTimer=setInterval(()=>{
    if(cyclePaused)return;
    const dur=cyclePhase==='potw'?POTW_DURATION:LB_DURATION;
    cycleElapsed+=tick;
    fill.style.width=((cycleElapsed/dur)*100)+'%';
    if(cycleElapsed>=dur){
      cycleElapsed=0;
      if(cyclePhase==='potw'){
        cyclePhase='lb';
        lbIndex=0;
        switchPanel('leaderboard');
        showLBTab(0);
      }else{
        lbIndex++;
        if(lbIndex>=LB_CATS.length){
          cyclePhase='potw';
          switchPanel('potw');
        }else{
          showLBTab(lbIndex);
        }
      }
    }
  },tick);
}

function showLBTab(idx){
  const btns=document.querySelectorAll('.lb-btn');
  const panels=document.querySelectorAll('.lb-panel');
  btns.forEach((b,i)=>b.classList.toggle('active',i===idx));
  panels.forEach((p,i)=>p.classList.toggle('active',i===idx));
}

// Manual nav
document.querySelectorAll('.nav-pill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    switchPanel(btn.dataset.panel);
    // Reset cycle
    cyclePhase=btn.dataset.panel==='potw'?'potw':'lb';
    cycleElapsed=0;
    if(cyclePhase==='lb')lbIndex=0;
  });
});

init();
</script>

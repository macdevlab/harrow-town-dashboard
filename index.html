<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #070e1a;
    --navy-mid: #0d1829;
    --navy-light: #132038;
    --navy-surface: #182845;
    --gold: #c9a84c;
    --gold-dim: #9a7d33;
    --gold-bright: #e8c85e;
    --gold-glow: rgba(201,168,76,0.12);
    --cream: #f2edd8;
    --cream-dim: #b8b19a;
    --green: #34d278;
    --green-bg: rgba(52,210,120,0.12);
    --red: #e8524a;
    --red-bg: rgba(232,82,74,0.12);
    --blue: #4a9de8;
    --draw-amber: #e8a84a;
    --draw-bg: rgba(232,168,74,0.12);
    --text-primary: #ddd8c8;
    --text-secondary: #8a8474;
    --text-muted: #5a5548;
    --border: rgba(201,168,76,0.10);
    --border-hover: rgba(201,168,76,0.25);
    --radius-lg: 10px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    --slide-duration: 6000;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--navy); color: var(--text-primary);
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,168,76,0.04), transparent 50%),
      radial-gradient(ellipse 60% 50% at 80% 90%, rgba(74,157,232,0.03), transparent 50%);
    pointer-events: none; z-index: 0;
  }

  /* ═══ HEADER ═══ */
  .header {
    position: relative;
    background: linear-gradient(180deg, var(--navy-mid) 0%, var(--navy) 100%);
    border-bottom: 1px solid var(--border); overflow: hidden;
  }
  .header::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .header-inner {
    max-width: 1320px; margin: 0 auto; padding: 1.75rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem; position: relative; z-index: 1;
  }
  .club-identity { display: flex; align-items: center; gap: 1.1rem; }
  .club-crest {
    width: 54px; height: 54px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
  }
  .club-crest img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .club-text .club-name {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem;
    color: var(--gold); letter-spacing: 3px; line-height: 1;
  }
  .club-text .club-sub {
    font-size: 0.72rem; color: var(--text-secondary);
    letter-spacing: 3px; text-transform: uppercase; font-weight: 500; margin-top: 0.15rem;
  }
  .header-right { text-align: right; }
  .header-right .season-badge {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem;
    color: var(--gold-dim); letter-spacing: 2px;
  }
  .header-right .last-updated {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
    color: var(--text-muted); margin-top: 0.15rem;
  }
  .data-status {
    font-size: 0.6rem; margin-top: 0.3rem; padding: 0.2rem 0.5rem;
    border-radius: 20px; display: inline-block; font-weight: 600; letter-spacing: 0.5px;
  }
  .data-status.live { background: var(--green-bg); color: var(--green); }
  .data-status.demo { background: var(--draw-bg); color: var(--draw-amber); }

  /* ═══ NAV ═══ */
  .nav {
    background: var(--navy-mid); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px);
  }
  .nav-inner {
    max-width: 1320px; margin: 0 auto; padding: 0 2rem;
    display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
  }
  .nav-inner::-webkit-scrollbar { display: none; }
  .nav-btn {
    padding: 0.85rem 1.4rem; font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem; letter-spacing: 2px; color: var(--text-muted);
    background: none; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; transition: var(--transition); white-space: nowrap;
  }
  .nav-btn:hover { color: var(--text-secondary); }
  .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ═══ MAIN ═══ */
  .main {
    max-width: 1320px; margin: 0 auto; padding: 1.75rem 2rem 3rem;
    position: relative; z-index: 1;
  }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ═══ SECTION HEADER ═══ */
  .sec-header {
    display: flex; align-items: baseline; justify-content: space-between;
    flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.5rem;
    padding-bottom: 1rem; border-bottom: 1px solid var(--border);
  }
  .sec-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
    color: var(--gold); letter-spacing: 1.5px;
  }

  /* ═══ CAROUSEL ═══ */
  .carousel-viewport {
    position: relative;
    overflow: hidden;
    min-height: 280px;
  }
  .carousel-slide {
    position: absolute; inset: 0;
    opacity: 0;
    transform: translateX(40px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    pointer-events: none;
  }
  .carousel-slide.active {
    opacity: 1;
    transform: translateX(0);
    position: relative;
    pointer-events: auto;
  }
  .carousel-slide.exit {
    opacity: 0;
    transform: translateX(-40px);
  }

  /* Dots / progress */
  .carousel-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    margin-top: 1.25rem;
  }
  .carousel-dot {
    width: 40px; height: 4px;
    border-radius: 2px;
    background: var(--navy-surface);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }
  .carousel-dot.active { background: rgba(201,168,76,0.2); }
  .carousel-dot-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 0%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.1s linear;
  }
  .carousel-dot.active .carousel-dot-fill { width: 0%; }

  .pause-hint {
    font-size: 0.6rem; color: var(--text-muted);
    text-align: center; margin-top: 0.5rem;
    letter-spacing: 1px; text-transform: uppercase;
    opacity: 0; transition: opacity 0.3s;
  }
  .carousel-viewport:hover + .carousel-controls + .pause-hint,
  .carousel-viewport.paused + .carousel-controls + .pause-hint { opacity: 1; }

  /* ═══ TEAM CARD (single, centered for carousel) ═══ */
  .t-card-wrap {
    max-width: 520px;
    margin: 0 auto;
  }
  .t-card {
    background: var(--navy-mid); border: 1px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
  }
  .t-card-top {
    padding: 0.9rem 1.15rem; display: flex; align-items: center;
    justify-content: space-between; background: var(--navy-light);
    border-bottom: 1px solid var(--border);
  }
  .t-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1.5px; color: var(--gold); }
  .t-result {
    font-size: 0.6rem; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 3px;
  }
  .t-result.won { background: var(--green-bg); color: var(--green); }
  .t-result.lost { background: var(--red-bg); color: var(--red); }
  .t-result.draw { background: var(--draw-bg); color: var(--draw-amber); }
  .t-opponent {
    padding: 0.5rem 1.15rem; font-size: 0.73rem; color: var(--text-muted);
    background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); font-weight: 500;
  }
  .t-card-body { padding: 1rem 1.15rem; }
  .potm-row {
    display: flex; align-items: center; gap: 0.9rem;
    padding-bottom: 0.9rem; margin-bottom: 0.9rem; border-bottom: 1px solid var(--border);
  }
  .potm-circle {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    display: grid; place-items: center; flex-shrink: 0;
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
  }
  .potm-circle span { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; color: var(--navy); }
  .potm-meta .potm-tag { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2.5px; color: var(--gold-dim); font-weight: 700; }
  .potm-meta .potm-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--cream); letter-spacing: 0.8px; line-height: 1.1; }
  .potm-meta .potm-summary { font-size: 0.76rem; color: var(--text-secondary); margin-top: 0.1rem; }
  .stat-lines { display: flex; flex-direction: column; gap: 0.4rem; }
  .stat-line {
    display: grid; grid-template-columns: 48px 1fr auto auto;
    align-items: center; gap: 0.5rem; padding: 0.45rem 0.65rem;
    background: rgba(0,0,0,0.18); border-radius: 4px; border-left: 3px solid transparent;
  }
  .stat-line.bat { border-left-color: var(--blue); }
  .stat-line.bowl { border-left-color: var(--green); }
  .stat-line.field { border-left-color: var(--gold); }
  .stat-line .s-cat { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 700; }
  .stat-line .s-name { font-size: 0.82rem; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-line .s-fig { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--cream-dim); white-space: nowrap; }
  .stat-line .s-pts { font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; color: var(--gold); text-align: right; min-width: 32px; }
  .no-match { padding: 2rem; text-align: center; color: var(--text-muted); font-size: 0.85rem; }

  /* ═══ LEADERBOARD ═══ */
  .lb-tabs { display: flex; gap: 0.4rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .lb-btn {
    padding: 0.55rem 1.3rem; font-family: 'Bebas Neue', sans-serif; font-size: 0.8rem;
    letter-spacing: 1.5px; background: var(--navy-mid); color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 4px; cursor: pointer; transition: var(--transition);
  }
  .lb-btn:hover { color: var(--text-secondary); border-color: var(--border-hover); }
  .lb-btn.active { background: var(--gold); color: var(--navy); border-color: var(--gold); }
  .lb-panel { display: none; }
  .lb-panel.active { display: block; }
  .lb-table {
    width: 100%; border-collapse: collapse; background: var(--navy-mid);
    border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border);
  }
  .lb-table thead th {
    padding: 0.75rem 0.85rem; font-family: 'Bebas Neue', sans-serif;
    font-size: 0.68rem; letter-spacing: 1.5px; color: var(--gold-dim);
    background: var(--navy-light); text-align: left;
    border-bottom: 1px solid rgba(201,168,76,0.15); white-space: nowrap;
  }
  .lb-table thead th.r { text-align: right; }
  .lb-table tbody tr { border-bottom: 1px solid var(--border); transition: background var(--transition); }
  .lb-table tbody tr:last-child { border-bottom: none; }
  .lb-table tbody tr:hover { background: var(--gold-glow); }
  .lb-table tbody td { padding: 0.65rem 0.85rem; font-size: 0.84rem; vertical-align: middle; }
  .lb-table tbody td.r { text-align: right; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; color: var(--cream-dim); }
  .lb-table tbody td.pts-col { text-align: right; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--gold); }
  .rank { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--text-muted); width: 36px; }
  .rank.g1 { color: var(--gold-bright); }
  .rank.g2 { color: #c0c0c0; }
  .rank.g3 { color: #cd7f32; }
  .p-name { font-weight: 600; }
  .p-team { font-size: 0.6rem; color: var(--text-muted); font-weight: 400; letter-spacing: 0.5px; margin-left: 0.35rem; }

  /* ═══ RESPONSIVE ═══ */
  @media (max-width: 768px) {
    .header-inner { padding: 1.25rem 1rem; }
    .club-text .club-name { font-size: 1.4rem; letter-spacing: 2px; }
    .main { padding: 1.25rem 1rem; }
    .t-card-wrap { max-width: 100%; }
    .nav-btn { padding: 0.75rem 1rem; font-size: 0.8rem; }
    .lb-table thead th, .lb-table tbody td { padding: 0.55rem 0.5rem; }
    .stat-line { grid-template-columns: 40px 1fr auto; }
    .stat-line .s-fig { display: none; }
  }
  @media (max-width: 480px) { .header-right { display: none; } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--navy-surface); border-radius: 3px; }
</style>
</head>

// ═══ CAROUSEL ENGINE ═══
class Carousel {
  constructor(viewportId, dotsId, slides, durationMs=SLIDE_MS) {
    this.viewport = document.getElementById(viewportId);
    this.dotsEl = document.getElementById(dotsId);
    this.slides = slides;
    this.duration = durationMs;
    this.current = 0;
    this.timer = null;
    this.progressTimer = null;
    this.paused = false;
    this.elapsed = 0;
    this.onComplete = null; // callback when all slides shown once

    this.viewport.innerHTML = slides.map((html, i) =>
      `<div class="carousel-slide${i===0?' active':''}" data-idx="${i}">${html}</div>`
    ).join('');

    this.dotsEl.innerHTML = slides.map((_, i) =>
      `<div class="carousel-dot${i===0?' active':''}" data-idx="${i}"><div class="carousel-dot-fill"></div></div>`
    ).join('');

    // Pause on hover
    this.viewport.addEventListener('mouseenter', () => this.pause());
    this.viewport.addEventListener('mouseleave', () => this.resume());
    // Click dots to jump
    this.dotsEl.querySelectorAll('.carousel-dot').forEach(dot => {
      dot.addEventListener('click', () => this.goTo(+dot.dataset.idx));
    });

    this.startProgress();
  }

  pause() { this.paused = true; this.viewport.classList.add('paused'); }
  resume() { this.paused = false; this.viewport.classList.remove('paused'); }

  startProgress() {
    this.elapsed = 0;
    const tick = 50;
    clearInterval(this.progressTimer);
    this.progressTimer = setInterval(() => {
      if (this.paused) return;
      this.elapsed += tick;
      const pct = Math.min((this.elapsed / this.duration) * 100, 100);
      const activeDot = this.dotsEl.querySelector('.carousel-dot.active .carousel-dot-fill');
      if (activeDot) activeDot.style.width = pct + '%';
      if (this.elapsed >= this.duration) {
        this.elapsed = 0;
        this.next();
      }
    }, tick);
  }

  next() {
    const prev = this.current;
    // If we're on the last slide and it's time to advance, fire completion instead of wrapping
    if (this.current === this.slides.length - 1 && this.onComplete) {
      this.destroy();
      this.onComplete();
      return;
    }
    this.current = this.current + 1;
    this.transition(prev, this.current);
  }

  goTo(idx) {
    if (idx === this.current) return;
    const prev = this.current;
    this.current = idx;
    this.transition(prev, this.current);
    this.elapsed = 0;
  }

  transition(fromIdx, toIdx) {
    const allSlides = this.viewport.querySelectorAll('.carousel-slide');
    const allDots = this.dotsEl.querySelectorAll('.carousel-dot');
    // Reset all dot fills
    allDots.forEach(d => { d.classList.remove('active'); d.querySelector('.carousel-dot-fill').style.width='0%'; });
    allDots[toIdx].classList.add('active');
    // Slide transition
    allSlides.forEach(s => { s.classList.remove('active','exit'); });
    allSlides[fromIdx].classList.add('exit');
    allSlides[toIdx].classList.add('active');
  }

  destroy() {
    clearInterval(this.progressTimer);
    clearTimeout(this.timer);
  }
}

// ═══ GLOBAL CAROUSEL ORCHESTRATOR ═══
let potwCarousel = null;
let lbCarousel = null;
let autoPhase = 'potw'; // 'potw' or 'leaderboard'

function switchToPanel(panelId) {
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.panel === panelId);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${panelId}`).classList.add('active');
}

function startAutoLoop() {
  autoPhase = 'potw';
  switchToPanel('potw');

  if (potwCarousel) potwCarousel.destroy();
  if (lbCarousel) lbCarousel.destroy();

  // Build POTW carousel
  const potwSlides = buildPOTWSlides();
  potwCarousel = new Carousel('potw-carousel', 'potw-dots', potwSlides, SLIDE_MS);
  potwCarousel.onComplete = () => {
    // After cycling all POTW slides, switch to leaderboards
    autoPhase = 'leaderboard';
    switchToPanel('leaderboard');
    startLBCarousel();
  };

  // Build LB carousel (but don't start it yet)
}

function startLBCarousel() {
  const lbSlides = buildLBSlides();
  if (lbCarousel) lbCarousel.destroy();
  lbCarousel = new Carousel('lb-carousel', 'lb-dots', lbSlides, 8000);
  // Update tab highlights as LB carousel advances
  const lbTabBtns = document.querySelectorAll('#lb-tabs-container .lb-btn');
  const origGoTo = lbCarousel.goTo.bind(lbCarousel);
  const origNext = lbCarousel.next.bind(lbCarousel);
  function highlightLBTab(idx) {
    lbTabBtns.forEach((b,i) => b.classList.toggle('active', i===idx));
  }
  highlightLBTab(0);
  const origTransition = lbCarousel.transition.bind(lbCarousel);
  lbCarousel.transition = (from, to) => { origTransition(from, to); highlightLBTab(to); };
  lbCarousel.onComplete = () => {
    // After cycling all LB categories, go back to POTW
    autoPhase = 'potw';
    switchToPanel('potw');
    if (potwCarousel) potwCarousel.destroy();
    const potwSlides = buildPOTWSlides();
    potwCarousel = new Carousel('potw-carousel', 'potw-dots', potwSlides, SLIDE_MS);
    potwCarousel.onComplete = () => {
      autoPhase = 'leaderboard';
      switchToPanel('leaderboard');
      startLBCarousel();
    };
  };
  // Click LB tabs to jump
  lbTabBtns.forEach((btn, i) => {
    btn.addEventListener('click', () => lbCarousel.goTo(i));
  });
}

// ═══ BUILD SLIDE HTML ═══

function buildPOTWSlides() {
  const ps = dashData.weekly_performances || [];
  const sorted = [...ps].sort((a,b) => {
    const ia=TEAM_ORDER.indexOf(a.team), ib=TEAM_ORDER.indexOf(b.team);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });
  return sorted.map(m => {
    const rc=m.won?'won':(m.result&&m.result.toLowerCase().includes('draw')?'draw':'lost');
    const rl=m.won?'Won':(rc==='draw'?'Draw':'Lost');
    const pm=m.potm_winner||{}, pp=m.players?m.players[pm.name]:null;
    let ps2='';
    if(pp){const p=[];const b=pp.batting||{};if(b.runs!=null){const no=String(b.how_out||'').toLowerCase().includes('not out')?'*':'';p.push(`${b.runs}${no} (${b.balls||'?'})`);}const bw=pp.bowling||{};if(bw.wickets)p.push(`${bw.wickets}-${bw.runs}`);const f=pp.fielding||{};const fp=[];if(f.catches)fp.push(`${f.catches} ct`);if(f.run_outs)fp.push(`${f.run_outs} ro`);if(f.stumpings)fp.push(`${f.stumpings} st`);if(fp.length)p.push(fp.join(', '));ps2=p.join(' &middot; ');}
    const bb=m.best_batter||{},bp=m.players?m.players[bb.name]:null;let bf2='';
    if(bp&&bp.batting){const b=bp.batting;const no=String(b.how_out||'').toLowerCase().includes('not out')?'*':'';bf2=`${b.runs}${no} (${b.balls||'?'})`;const e=[];if(b.fours)e.push(`${b.fours}&times;4`);if(b.sixes)e.push(`${b.sixes}&times;6`);if(e.length)bf2+=` &middot; ${e.join(' ')}`;}
    const bw2=m.best_bowler||{},bwp=m.players?m.players[bw2.name]:null;let bwf='';
    if(bwp&&bwp.bowling&&bwp.bowling.overs){const o=bwp.bowling;bwf=`${o.overs}-${o.maidens||0}-${o.runs}-${o.wickets}`;}
    const bf3=m.best_fielder||{},bfp=m.players?m.players[bf3.name]:null;let bff='';
    if(bfp&&bfp.fielding){const f=bfp.fielding;const p=[];if(f.catches)p.push(`${f.catches} catch${f.catches>1?'es':''}`);if(f.run_outs)p.push(`${f.run_outs} run out${f.run_outs>1?'s':''}`);if(f.stumpings)p.push(`${f.stumpings} stumping${f.stumpings>1?'s':''}`);bff=p.join(' &middot; ');}
    return `<div class="t-card-wrap"><div class="t-card"><div class="t-card-top"><span class="t-name">${m.team}</span><span class="t-result ${rc}">${rl}</span></div><div class="t-opponent">vs ${m.opponent}</div><div class="t-card-body"><div class="potm-row"><div class="potm-circle"><span>${pm.total_pts||0}</span></div><div class="potm-meta"><div class="potm-tag">Performance of the Week</div><div class="potm-name">${pm.name||'N/A'}</div><div class="potm-summary">${ps2}</div></div></div><div class="stat-lines"><div class="stat-line bat"><span class="s-cat">Bat</span><span class="s-name">${bb.name||'—'}</span><span class="s-fig">${bf2}</span><span class="s-pts">${bb.pts||0}</span></div><div class="stat-line bowl"><span class="s-cat">Bowl</span><span class="s-name">${bw2.name||'—'}</span><span class="s-fig">${bwf}</span><span class="s-pts">${bw2.pts||0}</span></div><div class="stat-line field"><span class="s-cat">Field</span><span class="s-name">${bf3.name||'—'}</span><span class="s-fig">${bff}</span><span class="s-pts">${bf3.pts||0}</span></div></div></div></div></div>`;
  });
}

function buildLBSlides() {
  const lb = dashData.leaderboards || {};
  const dataMap = { bat: lb.batting||[], bowl: lb.bowling||[], field: lb.fielding||[], overall: lb.overall||[] };

  // Build tab buttons
  const tabsContainer = document.getElementById('lb-tabs-container');
  tabsContainer.innerHTML = LB_CATEGORIES.map((cat, i) =>
    `<button class="lb-btn${i===0?' active':''}" data-idx="${i}">${cat.label}</button>`
  ).join('');

  return LB_CATEGORIES.map(cat => {
    const data = [...(dataMap[cat.id]||[])].sort((a,b) => (b[cat.pk]||0)-(a[cat.pk]||0));
    if (!data.length) return '<div class="no-match">No data yet</div>';
    const th = cat.cols.map(c => `<th class="${c.c||''}">${c.l}</th>`).join('');
    const rows = data.slice(0,10).map((r,i) => {
      const rc = i===0?'g1':i===1?'g2':i===2?'g3':'';
      const td = cat.cols.map(c => `<td class="${c.c||''}">${r[c.k]??'—'}</td>`).join('');
      return `<tr><td class="rank ${rc}">${i+1}</td><td class="p-name">${r.name}<span class="p-team">${r.team}</span></td>${td}<td class="pts-col">${(r[cat.pk]||0).toLocaleString()}</td></tr>`;
    }).join('');
    return `<table class="lb-table"><thead><tr><th>#</th><th>Player</th>${th}<th class="r">Pts</th></tr></thead><tbody>${rows}</tbody></table>`;
  });
}

  // Manual nav overrides (pauses auto-advance temporarily)

    btn.addEventListener('click', () => switchToPanel(btn.dataset.panel));
  });
}
